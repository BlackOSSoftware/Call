// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Match @capacitor/android (avoids "built with X / synced with Y" + satisfies androidx.browser metadata)
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.2'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Kotlin 1.8+ ships JDK7/8 APIs inside kotlin-stdlib. Older transitive deps (e.g. Cordova)
// still pull kotlin-stdlib-jdk7/jdk8 1.6.x and cause duplicate class errors at DEX merge.
subprojects { sub ->
    sub.configurations.configureEach { cfg ->
        cfg.exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
        cfg.exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
